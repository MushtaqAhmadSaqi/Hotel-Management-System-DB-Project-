<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings - Royal Stay HMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="menu-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h2>Royal Stay</h2>
        <p>Hotel Management System</p>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="guests.html"><span class="icon">👥</span> Guests</a>
        <a href="rooms.html"><span class="icon">🛏️</span> Rooms</a>
        <a href="bookings.html" class="active"><span class="icon">📅</span> Bookings</a>
        <a href="payments.html"><span class="icon">💳</span> Payments</a>
        <a href="services.html"><span class="icon">🛎️</span> Services</a>
        <a href="staff.html"><span class="icon">👨‍💼</span> Staff</a>
        <a href="reports.html"><span class="icon">📈</span> Reports</a>
        <a href="#" onclick="HMS.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Booking Management</h1>
          <p>Create and manage all hotel bookings.</p>
        </div>
        <div class="topbar-right">
          <div class="user-avatar">A</div>
          <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
        </div>
      </header>

      <section class="content-card">
        <h2>Create New Booking</h2>
        <form id="bookingForm">
          <input type="hidden" id="editBookingId" />
          <div class="form-grid">
            <div class="form-group">
              <label>Select Guest</label>
              <select id="guestId" required></select>
            </div>
            <div class="form-group">
              <label>Select Room</label>
              <select id="roomId" required></select>
            </div>
            <div class="form-group">
              <label>Check-in Date</label>
              <input type="date" id="checkInDate" required />
            </div>
            <div class="form-group">
              <label>Check-out Date</label>
              <input type="date" id="checkOutDate" required />
            </div>
            <div class="form-group">
              <label>Booking Status</label>
              <select id="bookingStatus">
                <option>Pending</option>
                <option>Confirmed</option>
                <option>Cancelled</option>
                <option>Completed</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Booking</button>
            <button class="btn btn-light" type="button" onclick="resetBookingForm()">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="content-card">
        <div class="table-header">
          <h2>All Bookings</h2>
          <input class="search-input" id="searchBooking" placeholder="🔍 Search bookings..." />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Guest</th>
                <th>Room</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Days</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.menu-overlay').classList.toggle('active');
    }

    async function loadBookingSelects() {
      const guests = await HMS.get("guests");
      const allRooms = await HMS.get("rooms");
      const rooms = allRooms.filter(r => r.status === "Available" || r.status === "Booked");

      document.getElementById("guestId").innerHTML = guests.map(g =>
        `<option value="${g.guestId}">${g.fullName}</option>`
      ).join("");

      document.getElementById("roomId").innerHTML = rooms.map(r =>
        `<option value="${r.roomId}">Room ${r.roomNumber} - ${r.roomType} (${r.status})</option>`
      ).join("");
    }

    function countDays(start, end) {
      const s = new Date(start);
      const e = new Date(end);
      const diff = Math.ceil((e - s) / (1000 * 60 * 60 * 24));
      return diff > 0 ? diff : 1;
    }

    function resetBookingForm() {
      document.getElementById("bookingForm").reset();
      document.getElementById("editBookingId").value = "";
    }

    async function renderBookings() {
      const keyword = document.getElementById("searchBooking").value.toLowerCase();
      const data = await HMS.get("bookings");
      const bookings = data.filter(b =>
        Object.values(b).join(" ").toLowerCase().includes(keyword)
      );

      document.getElementById("bookingTable").innerHTML = bookings.map(b => `
        <tr>
          <td><strong>${b.bookingId}</strong></td>
          <td>${b.guestName}</td>
          <td><span class="badge badge-info">Room ${b.roomNumber}</span></td>
          <td>${HMS.formatDate(b.checkInDate)}</td>
          <td>${HMS.formatDate(b.checkOutDate)}</td>
          <td>${b.numberOfDays} days</td>
          <td>${HMS.badge(b.bookingStatus)}</td>
          <td>
            <button class="btn btn-secondary small-btn" onclick="editBooking('${b.bookingId}')">✏️ Edit</button>
            <button class="btn btn-danger small-btn" onclick="deleteBooking('${b.bookingId}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="8" class="empty-state"><span class="icon">📅</span><h3>No bookings found</h3><p>Create your first booking using the form above</p></td></tr>`;
    }

    async function editBooking(id) {
      const b = await HMS.find("bookings", id, "bookingId");
      if (!b) return;

      document.getElementById("editBookingId").value = b.bookingId;
      document.getElementById("guestId").value = b.guestId;
      document.getElementById("roomId").value = b.roomId;
      document.getElementById("checkInDate").value = b.checkInDate;
      document.getElementById("checkOutDate").value = b.checkOutDate;
      document.getElementById("bookingStatus").value = b.bookingStatus;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteBooking(id) {
      if (confirmDelete("Are you sure you want to delete this booking?")) {
        await HMS.remove("bookings", id, "bookingId");
        renderBookings();
      }
    }

    document.getElementById("bookingForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const editId = document.getElementById("editBookingId").value;
      const guest = await HMS.find("guests", document.getElementById("guestId").value, "guestId");
      const room = await HMS.find("rooms", document.getElementById("roomId").value, "roomId");
      const checkInDate = document.getElementById("checkInDate").value;
      const checkOutDate = document.getElementById("checkOutDate").value;
      const status = document.getElementById("bookingStatus").value;

      const record = {
        bookingId: editId || HMS.generateId("B"),
        guestId: guest.guestId,
        roomId: room.roomId,
        guestName: guest.fullName,
        roomNumber: room.roomNumber,
        checkInDate,
        checkOutDate,
        numberOfDays: countDays(checkInDate, checkOutDate),
        bookingStatus: status
      };

      await HMS.save("bookings", record, editId, "bookingId");

      if (status === "Confirmed") {
        room.status = "Booked";
        await HMS.save("rooms", room, room.roomId, "roomId");
      }

      resetBookingForm();
      await loadBookingSelects();
      renderBookings();
    });

    document.getElementById("searchBooking").addEventListener("input", renderBookings);
    document.addEventListener("DOMContentLoaded", async function() {
      await loadBookingSelects();
      await renderBookings();
    });
  </script>
</body>
</html>
