<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guests - Royal Stay HMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="menu-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h2>Royal Stay</h2>
        <p>Hotel Management System</p>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="guests.html" class="active"><span class="icon">👥</span> Guests</a>
        <a href="rooms.html"><span class="icon">🛏️</span> Rooms</a>
        <a href="bookings.html"><span class="icon">📅</span> Bookings</a>
        <a href="payments.html"><span class="icon">💳</span> Payments</a>
        <a href="services.html"><span class="icon">🛎️</span> Services</a>
        <a href="staff.html"><span class="icon">👨‍💼</span> Staff</a>
        <a href="reports.html"><span class="icon">📈</span> Reports</a>
        <a href="#" onclick="HMS.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Guest Management</h1>
          <p>Manage all hotel guests and their information.</p>
        </div>
        <div class="topbar-right">
          <div class="user-avatar">A</div>
          <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
        </div>
      </header>

      <section class="content-card">
        <h2>Add New Guest</h2>
        <form id="guestForm">
          <input type="hidden" id="editGuestId" />
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Enter full name" required />
            </div>
            <div class="form-group">
              <label>CNIC / Passport</label>
              <input type="text" id="cnic" placeholder="e.g. 35202-1234567-1" required />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" placeholder="e.g. 03001234567" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="guest@example.com" />
            </div>
            <div class="form-group">
              <label>Nationality</label>
              <input type="text" id="nationality" value="Pakistani" />
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select id="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="address" placeholder="City, Area" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Guest</button>
            <button class="btn btn-light" type="button" onclick="resetGuestForm()">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="content-card">
        <div class="table-header">
          <h2>All Guests</h2>
          <input class="search-input" id="searchGuest" placeholder="🔍 Search guests..." />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>CNIC</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Nationality</th>
                <th>Gender</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="guestTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.menu-overlay').classList.toggle('active');
    }

    function resetGuestForm() {
      document.getElementById("guestForm").reset();
      document.getElementById("editGuestId").value = "";
      document.getElementById("nationality").value = "Pakistani";
    }

    function renderGuests() {
      const keyword = document.getElementById("searchGuest").value.toLowerCase();
      const guests = HMS.get("guests").filter(g =>
        Object.values(g).join(" ").toLowerCase().includes(keyword)
      );

      document.getElementById("guestTable").innerHTML = guests.map(g => `
        <tr>
          <td><strong>${g.guestId}</strong></td>
          <td>${g.fullName}</td>
          <td>${g.cnic}</td>
          <td>${g.phone}</td>
          <td>${g.email || "-"}</td>
          <td>${g.nationality || "-"}</td>
          <td>${HMS.badge(g.gender)}</td>
          <td>
            <button class="btn btn-secondary small-btn" onclick="editGuest('${g.guestId}')">✏️ Edit</button>
            <button class="btn btn-danger small-btn" onclick="deleteGuest('${g.guestId}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="8" class="empty-state"><span class="icon">👥</span><h3>No guests found</h3><p>Add your first guest using the form above</p></td></tr>`;
    }

    function editGuest(id) {
      const g = HMS.find("guests", id, "guestId");
      if (!g) return;

      document.getElementById("editGuestId").value = g.guestId;
      document.getElementById("fullName").value = g.fullName;
      document.getElementById("cnic").value = g.cnic;
      document.getElementById("phone").value = g.phone;
      document.getElementById("email").value = g.email || "";
      document.getElementById("nationality").value = g.nationality || "";
      document.getElementById("gender").value = g.gender || "Male";
      document.getElementById("address").value = g.address || "";

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteGuest(id) {
      if (confirmDelete("Are you sure you want to delete this guest?")) {
        HMS.remove("guests", id, "guestId");
        renderGuests();
      }
    }

    document.getElementById("guestForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const editId = document.getElementById("editGuestId").value;
      const record = {
        guestId: editId || HMS.generateId("G"),
        fullName: document.getElementById("fullName").value.trim(),
        cnic: document.getElementById("cnic").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
        nationality: document.getElementById("nationality").value.trim(),
        gender: document.getElementById("gender").value,
        address: document.getElementById("address").value.trim()
      };

      HMS.save("guests", record, editId, "guestId");
      resetGuestForm();
      renderGuests();
    });

    document.getElementById("searchGuest").addEventListener("input", renderGuests);
    document.addEventListener("DOMContentLoaded", renderGuests);
  </script>
</body>
</html>
