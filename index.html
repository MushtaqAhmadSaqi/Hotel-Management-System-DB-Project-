<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Stay HMS - Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-header">
      <div class="hotel-icon">🏨</div>
      <h1>Royal Stay</h1>
      <p>Hotel Management System</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label>
          <span class="input-icon">👤</span>
          Username
        </label>
        <input type="text" id="username" placeholder="Enter your username" required />
      </div>

      <div class="form-group">
        <label>
          <span class="input-icon">🔒</span>
          Password
        </label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full login-btn" type="submit">
        <span>Sign In</span>
        <span class="btn-arrow">→</span>
      </button>
    </form>

    <div class="login-footer">
      <p class="demo-info">
        <span class="demo-badge">Demo Access</span>
        Username: <strong>admin</strong> | Password: <strong>admin123</strong>
      </p>
    </div>

    <div class="login-decoration">
      <div class="decoration-line"></div>
      <div class="social-icons">
        <span>📧</span>
        <span>📱</span>
        <span>🌐</span>
      </div>
      <div class="decoration-line"></div>
    </div>
  </div>

  <style>
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .hotel-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: inline-block;
    }

    .login-card h1 {
      font-size: 32px;
      margin-bottom: 6px;
    }

    .login-form .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-icon {
      font-size: 16px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-light);
      cursor: pointer;
    }

    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .forgot-link {
      color: var(--primary);
      font-weight: 500;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: var(--primary-dark);
    }

    .login-btn {
      position: relative;
      overflow: hidden;
    }

    .btn-arrow {
      transition: transform 0.3s ease;
    }

    .login-btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
    }

    .demo-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-light);
      font-size: 13px;
    }

    .demo-badge {
      background: rgba(212, 175, 55, 0.15);
      color: var(--secondary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-decoration {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
    }

    .decoration-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .social-icons {
      display: flex;
      gap: 12px;
    }

    .social-icons span {
      font-size: 18px;
      opacity: 0.5;
      transition: opacity 0.3s, transform 0.3s;
    }

    .social-icons span:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    /* Shake animation for error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }
  </style>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginCard = document.querySelector('.login-card');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === "admin" && password === "admin123") {
        // Add success animation
        const btn = loginForm.querySelector('.login-btn');
        btn.innerHTML = '<span>✓ Welcome!</span>';
        btn.style.background = 'var(--success)';
        btn.style.color = 'white';

        setTimeout(() => {
          localStorage.setItem("hms_logged_in", "true");
          window.location.href = "dashboard.html";
        }, 800);
      } else {
        // Add shake animation
        loginCard.classList.add('shake');
        setTimeout(() => loginCard.classList.remove('shake'), 400);

        // Add error styling
        document.getElementById('username').style.borderColor = '#ef4444';
        document.getElementById('password').style.borderColor = '#ef4444';

        setTimeout(() => {
          document.getElementById('username').style.borderColor = '';
          document.getElementById('password').style.borderColor = '';
        }, 2000);
      }
    });

    // Clear error on input
    document.querySelectorAll('#username, #password').forEach(input => {
      input.addEventListener('input', function() {
        this.style.borderColor = '';
      });
    });
  </script>
</body>
</html>
