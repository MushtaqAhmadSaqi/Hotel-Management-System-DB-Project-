<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Management System - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Hotel Management System</h1>
    <p>Admin login panel</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required />
      </div>

      <button class="btn btn-primary btn-full" type="submit">Login</button>
    </form>

    <p class="footer-note">Demo Login: admin / admin123</p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "admin" && password === "admin123") {
        localStorage.setItem("hms_logged_in", "true");
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid username or password. Use admin / admin123");
      }
    });
  </script>
</body>
</html>
