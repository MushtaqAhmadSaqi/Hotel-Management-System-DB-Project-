<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments - Royal Stay HMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="menu-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h2>Royal Stay</h2>
        <p>Hotel Management System</p>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="guests.html"><span class="icon">👥</span> Guests</a>
        <a href="rooms.html"><span class="icon">🛏️</span> Rooms</a>
        <a href="bookings.html"><span class="icon">📅</span> Bookings</a>
        <a href="payments.html" class="active"><span class="icon">💳</span> Payments</a>
        <a href="services.html"><span class="icon">🛎️</span> Services</a>
        <a href="staff.html"><span class="icon">👨‍💼</span> Staff</a>
        <a href="reports.html"><span class="icon">📈</span> Reports</a>
        <a href="#" onclick="HMS.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Payment Management</h1>
          <p>Manage all payment transactions.</p>
        </div>
        <div class="topbar-right">
          <div class="user-avatar">A</div>
          <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
        </div>
      </header>

      <section class="content-card">
        <h2>Record Payment</h2>
        <form id="paymentForm">
          <input type="hidden" id="editPaymentId" />
          <div class="form-grid">
            <div class="form-group">
              <label>Select Booking</label>
              <select id="bookingId" required></select>
            </div>
            <div class="form-group">
              <label>Room Charges (PKR)</label>
              <input type="number" id="roomCharges" placeholder="Total room cost" required />
            </div>
            <div class="form-group">
              <label>Service Charges (PKR)</label>
              <input type="number" id="serviceCharges" value="0" placeholder="Extra services" />
            </div>
            <div class="form-group">
              <label>Discount (PKR)</label>
              <input type="number" id="discount" value="0" placeholder="Discount amount" />
            </div>
            <div class="form-group">
              <label>Paid Amount (PKR)</label>
              <input type="number" id="paidAmount" placeholder="Amount paid" required />
            </div>
            <div class="form-group">
              <label>Payment Method</label>
              <select id="paymentMethod">
                <option>Cash</option>
                <option>Card</option>
                <option>Bank Transfer</option>
                <option>Online Payment</option>
              </select>
            </div>
            <div class="form-group">
              <label>Payment Status</label>
              <select id="paymentStatus">
                <option>Paid</option>
                <option>Pending</option>
                <option>Partial</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Payment</button>
            <button class="btn btn-light" type="button" onclick="resetPaymentForm()">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="content-card">
        <div class="table-header">
          <h2>All Payments</h2>
          <input class="search-input" id="searchPayment" placeholder="🔍 Search payments..." />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Guest</th>
                <th>Room</th>
                <th>Total</th>
                <th>Paid</th>
                <th>Remaining</th>
                <th>Method</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="paymentTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.menu-overlay').classList.toggle('active');
    }

    async function loadPaymentSelects() {
      const bookings = await HMS.get("bookings");
      document.getElementById("bookingId").innerHTML = bookings.map(b =>
        `<option value="${b.bookingId}">${b.guestName} - Room ${b.roomNumber}</option>`
      ).join("");
    }

    function resetPaymentForm() {
      document.getElementById("paymentForm").reset();
      document.getElementById("editPaymentId").value = "";
      document.getElementById("serviceCharges").value = 0;
      document.getElementById("discount").value = 0;
    }

    async function renderPayments() {
      const keyword = document.getElementById("searchPayment").value.toLowerCase();
      const data = await HMS.get("payments");
      const payments = data.filter(p =>
        Object.values(p).join(" ").toLowerCase().includes(keyword)
      );

      document.getElementById("paymentTable").innerHTML = payments.map(p => `
        <tr>
          <td><strong>${p.paymentId}</strong></td>
          <td>${p.guestName}</td>
          <td><span class="badge badge-info">Room ${p.roomNumber}</span></td>
          <td>${HMS.formatCurrency(p.totalAmount)}</td>
          <td>${HMS.formatCurrency(p.paidAmount)}</td>
          <td>${HMS.formatCurrency(p.remainingAmount)}</td>
          <td>${p.paymentMethod}</td>
          <td>${HMS.badge(p.paymentStatus)}</td>
          <td>
            <button class="btn btn-secondary small-btn" onclick="editPayment('${p.paymentId}')">✏️ Edit</button>
            <button class="btn btn-danger small-btn" onclick="deletePayment('${p.paymentId}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="9" class="empty-state"><span class="icon">💳</span><h3>No payments found</h3><p>Record your first payment using the form above</p></td></tr>`;
    }

    async function editPayment(id) {
      const p = await HMS.find("payments", id, "paymentId");
      if (!p) return;

      document.getElementById("editPaymentId").value = p.paymentId;
      document.getElementById("bookingId").value = p.bookingId;
      document.getElementById("roomCharges").value = p.roomCharges;
      document.getElementById("serviceCharges").value = p.serviceCharges;
      document.getElementById("discount").value = p.discount;
      document.getElementById("paidAmount").value = p.paidAmount;
      document.getElementById("paymentMethod").value = p.paymentMethod;
      document.getElementById("paymentStatus").value = p.paymentStatus;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deletePayment(id) {
      if (confirmDelete("Are you sure you want to delete this payment?")) {
        await HMS.remove("payments", id, "paymentId");
        renderPayments();
      }
    }

    document.getElementById("paymentForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const editId = document.getElementById("editPaymentId").value;
      const booking = await HMS.find("bookings", document.getElementById("bookingId").value, "bookingId");

      const roomCharges = Number(document.getElementById("roomCharges").value);
      const serviceCharges = Number(document.getElementById("serviceCharges").value || 0);
      const discount = Number(document.getElementById("discount").value || 0);
      const paidAmount = Number(document.getElementById("paidAmount").value || 0);
      const totalAmount = roomCharges + serviceCharges - discount;
      const remainingAmount = totalAmount - paidAmount;

      const record = {
        paymentId: editId || HMS.generateId("P"),
        bookingId: booking.bookingId,
        guestName: booking.guestName,
        roomNumber: booking.roomNumber,
        roomCharges,
        serviceCharges,
        discount,
        totalAmount,
        paidAmount,
        remainingAmount,
        paymentMethod: document.getElementById("paymentMethod").value,
        paymentStatus: document.getElementById("paymentStatus").value
      };

      await HMS.save("payments", record, editId, "paymentId");
      resetPaymentForm();
      renderPayments();
    });

    document.getElementById("searchPayment").addEventListener("input", renderPayments);
    document.addEventListener("DOMContentLoaded", async function() {
      await loadPaymentSelects();
      await renderPayments();
    });
  </script>
</body>
</html>
