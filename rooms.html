<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Management - Hotel Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    
<aside class="sidebar">
  <div class="brand">
    <h2>Royal Stay HMS</h2>
    <p>Hotel Management System</p>
  </div>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="guests.html">Guests</a>
    <a href="rooms.html">Rooms</a>
    <a href="bookings.html">Bookings</a>
    <a href="payments.html">Payments</a>
    <a href="services.html">Services</a>
    <a href="staff.html">Staff</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="HMS.logout()">Logout</a>
  </nav>
</aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Room Management</h1>
          <p>Manage room types, prices, floors, bed types, and availability.</p>
        </div>
        <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
      </header>

      
<section class="content-card">
  <h2>Room Form</h2>
  <form id="roomForm">
    <input type="hidden" id="editRoomId" />
    <div class="form-grid">
      <div class="form-group">
        <label>Room ID</label>
        <input type="text" id="roomId" placeholder="Auto or type e.g. R001" />
      </div>
      <div class="form-group">
        <label>Room Number</label>
        <input type="text" id="roomNumber" required />
      </div>
      <div class="form-group">
        <label>Room Type</label>
        <select id="roomType">
          <option>Single</option>
          <option>Double</option>
          <option>Deluxe</option>
          <option>Suite</option>
          <option>Family Room</option>
        </select>
      </div>
      <div class="form-group">
        <label>Floor</label>
        <input type="text" id="floor" placeholder="1st Floor" />
      </div>
      <div class="form-group">
        <label>Bed Type</label>
        <select id="bedType">
          <option>Single Bed</option>
          <option>Double Bed</option>
          <option>King Bed</option>
          <option>Twin Bed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price Per Night</label>
        <input type="number" id="pricePerNight" required />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option>Available</option>
          <option>Booked</option>
          <option>Occupied</option>
          <option>Under Maintenance</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save Room</button>
      <button class="btn btn-light" type="button" onclick="resetRoomForm()">Clear</button>
    </div>
  </form>
</section>

<section class="content-card">
  <div class="table-header">
    <h2>Room Records</h2>
    <input class="search-input" id="searchRoom" placeholder="Search rooms..." />
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Room ID</th>
          <th>Room No.</th>
          <th>Type</th>
          <th>Floor</th>
          <th>Bed Type</th>
          <th>Price/Night</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="roomTable"></tbody>
    </table>
  </div>
</section>

    </main>
  </div>

  <script src="js/app.js"></script>
  
<script>
function resetRoomForm() {
  document.getElementById("roomForm").reset();
  document.getElementById("editRoomId").value = "";
}

function renderRooms() {
  const keyword = document.getElementById("searchRoom").value.toLowerCase();
  const rooms = HMS.get("rooms").filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(keyword)
  );

  document.getElementById("roomTable").innerHTML = rooms.map(r => `
    <tr>
      <td>${r.roomId}</td>
      <td>${r.roomNumber}</td>
      <td>${r.roomType}</td>
      <td>${r.floor || "-"}</td>
      <td>${r.bedType}</td>
      <td>${r.pricePerNight}</td>
      <td>${HMS.badge(r.status)}</td>
      <td>
        <button class="btn btn-secondary small-btn" onclick="editRoom('${r.roomId}')">Edit</button>
        <button class="btn btn-danger small-btn" onclick="deleteRoom('${r.roomId}')">Delete</button>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="8">No room records found.</td></tr>`;
}

function editRoom(id) {
  const r = HMS.find("rooms", id, "roomId");
  if (!r) return;

  document.getElementById("editRoomId").value = r.roomId;
  document.getElementById("roomId").value = r.roomId;
  document.getElementById("roomNumber").value = r.roomNumber;
  document.getElementById("roomType").value = r.roomType;
  document.getElementById("floor").value = r.floor || "";
  document.getElementById("bedType").value = r.bedType;
  document.getElementById("pricePerNight").value = r.pricePerNight;
  document.getElementById("status").value = r.status;
}

function deleteRoom(id) {
  if (confirm("Are you sure you want to delete this room?")) {
    HMS.remove("rooms", id, "roomId");
    renderRooms();
  }
}

document.getElementById("roomForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const editId = document.getElementById("editRoomId").value;
  const record = {
    roomId: document.getElementById("roomId").value.trim() || HMS.generateId("R"),
    roomNumber: document.getElementById("roomNumber").value.trim(),
    roomType: document.getElementById("roomType").value,
    floor: document.getElementById("floor").value.trim(),
    bedType: document.getElementById("bedType").value,
    pricePerNight: Number(document.getElementById("pricePerNight").value),
    status: document.getElementById("status").value
  };

  HMS.save("rooms", record, editId, "roomId");
  resetRoomForm();
  renderRooms();
});

document.getElementById("searchRoom").addEventListener("input", renderRooms);
document.addEventListener("DOMContentLoaded", renderRooms);
</script>

</body>
</html>
