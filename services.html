<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Management - Hotel Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    
<aside class="sidebar">
  <div class="brand">
    <h2>Royal Stay HMS</h2>
    <p>Hotel Management System</p>
  </div>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="guests.html">Guests</a>
    <a href="rooms.html">Rooms</a>
    <a href="bookings.html">Bookings</a>
    <a href="payments.html">Payments</a>
    <a href="services.html">Services</a>
    <a href="staff.html">Staff</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="HMS.logout()">Logout</a>
  </nav>
</aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Service Management</h1>
          <p>Manage extra hotel services such as laundry, cleaning, pickup, and food orders.</p>
        </div>
        <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
      </header>

      
<section class="content-card">
  <h2>Service Form</h2>
  <form id="serviceForm">
    <input type="hidden" id="editServiceId" />
    <div class="form-grid">
      <div class="form-group">
        <label>Service ID</label>
        <input type="text" id="serviceId" placeholder="Auto or type e.g. S001" />
      </div>
      <div class="form-group">
        <label>Booking</label>
        <select id="bookingId" required></select>
      </div>
      <div class="form-group">
        <label>Service Name</label>
        <select id="serviceName">
          <option>Laundry</option>
          <option>Food Order</option>
          <option>Room Cleaning</option>
          <option>Airport Pickup</option>
          <option>Extra Bed</option>
          <option>Mini Bar</option>
        </select>
      </div>
      <div class="form-group">
        <label>Service Price</label>
        <input type="number" id="servicePrice" required />
      </div>
      <div class="form-group">
        <label>Service Date</label>
        <input type="date" id="serviceDate" required />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save Service</button>
      <button class="btn btn-light" type="button" onclick="resetServiceForm()">Clear</button>
    </div>
  </form>
</section>

<section class="content-card">
  <div class="table-header">
    <h2>Service Records</h2>
    <input class="search-input" id="searchService" placeholder="Search services..." />
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Service ID</th>
          <th>Booking</th>
          <th>Guest</th>
          <th>Service</th>
          <th>Price</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="serviceTable"></tbody>
    </table>
  </div>
</section>

    </main>
  </div>

  <script src="js/app.js"></script>
  
<script>
function loadServiceSelects() {
  const bookings = HMS.get("bookings");
  document.getElementById("bookingId").innerHTML = bookings.map(b =>
    `<option value="${b.bookingId}">${b.bookingId} - ${b.guestName} - Room ${b.roomNumber}</option>`
  ).join("");
}

function resetServiceForm() {
  document.getElementById("serviceForm").reset();
  document.getElementById("editServiceId").value = "";
}

function renderServices() {
  const keyword = document.getElementById("searchService").value.toLowerCase();
  const services = HMS.get("services").filter(s =>
    Object.values(s).join(" ").toLowerCase().includes(keyword)
  );

  document.getElementById("serviceTable").innerHTML = services.map(s => `
    <tr>
      <td>${s.serviceId}</td>
      <td>${s.bookingId}</td>
      <td>${s.guestName}</td>
      <td>${s.serviceName}</td>
      <td>${s.servicePrice}</td>
      <td>${s.serviceDate}</td>
      <td>
        <button class="btn btn-secondary small-btn" onclick="editService('${s.serviceId}')">Edit</button>
        <button class="btn btn-danger small-btn" onclick="deleteService('${s.serviceId}')">Delete</button>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="7">No service records found.</td></tr>`;
}

function editService(id) {
  const s = HMS.find("services", id, "serviceId");
  if (!s) return;

  document.getElementById("editServiceId").value = s.serviceId;
  document.getElementById("serviceId").value = s.serviceId;
  document.getElementById("bookingId").value = s.bookingId;
  document.getElementById("serviceName").value = s.serviceName;
  document.getElementById("servicePrice").value = s.servicePrice;
  document.getElementById("serviceDate").value = s.serviceDate;
}

function deleteService(id) {
  if (confirm("Are you sure you want to delete this service?")) {
    HMS.remove("services", id, "serviceId");
    renderServices();
  }
}

document.getElementById("serviceForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const editId = document.getElementById("editServiceId").value;
  const booking = HMS.find("bookings", document.getElementById("bookingId").value, "bookingId");

  const record = {
    serviceId: document.getElementById("serviceId").value.trim() || HMS.generateId("S"),
    bookingId: booking.bookingId,
    guestName: booking.guestName,
    serviceName: document.getElementById("serviceName").value,
    servicePrice: Number(document.getElementById("servicePrice").value),
    serviceDate: document.getElementById("serviceDate").value
  };

  HMS.save("services", record, editId, "serviceId");
  resetServiceForm();
  renderServices();
});

document.getElementById("searchService").addEventListener("input", renderServices);
document.addEventListener("DOMContentLoaded", function() {
  loadServiceSelects();
  renderServices();
});
</script>

</body>
</html>
