<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services - Royal Stay HMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="menu-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h2>Royal Stay</h2>
        <p>Hotel Management System</p>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="guests.html"><span class="icon">👥</span> Guests</a>
        <a href="rooms.html"><span class="icon">🛏️</span> Rooms</a>
        <a href="bookings.html"><span class="icon">📅</span> Bookings</a>
        <a href="payments.html"><span class="icon">💳</span> Payments</a>
        <a href="services.html" class="active"><span class="icon">🛎️</span> Services</a>
        <a href="staff.html"><span class="icon">👨‍💼</span> Staff</a>
        <a href="reports.html"><span class="icon">📈</span> Reports</a>
        <a href="#" onclick="HMS.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Services Management</h1>
          <p>Manage additional hotel services for guests.</p>
        </div>
        <div class="topbar-right">
          <div class="user-avatar">A</div>
          <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
        </div>
      </header>

      <section class="content-card">
        <h2>Add New Service</h2>
        <form id="serviceForm">
          <input type="hidden" id="editServiceId" />
          <div class="form-grid">
            <div class="form-group">
              <label>Select Booking</label>
              <select id="bookingId" required></select>
            </div>
            <div class="form-group">
              <label>Service Type</label>
              <select id="serviceName">
                <option>Laundry</option>
                <option>Food Order</option>
                <option>Room Cleaning</option>
                <option>Airport Pickup</option>
                <option>Extra Bed</option>
                <option>Mini Bar</option>
                <option>Spa</option>
                <option>Gym</option>
              </select>
            </div>
            <div class="form-group">
              <label>Service Price (PKR)</label>
              <input type="number" id="servicePrice" placeholder="Service cost" required />
            </div>
            <div class="form-group">
              <label>Service Date</label>
              <input type="date" id="serviceDate" required />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Service</button>
            <button class="btn btn-light" type="button" onclick="resetServiceForm()">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="content-card">
        <div class="table-header">
          <h2>All Services</h2>
          <input class="search-input" id="searchService" placeholder="🔍 Search services..." />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Guest</th>
                <th>Service</th>
                <th>Price</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="serviceTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.menu-overlay').classList.toggle('active');
    }

    async function loadServiceSelects() {
      const bookings = await HMS.get("bookings");
      document.getElementById("bookingId").innerHTML = bookings.map(b =>
        `<option value="${b.bookingId}">${b.guestName} - Room ${b.roomNumber}</option>`
      ).join("");
    }

    function resetServiceForm() {
      document.getElementById("serviceForm").reset();
      document.getElementById("editServiceId").value = "";
    }

    async function renderServices() {
      const keyword = document.getElementById("searchService").value.toLowerCase();
      const data = await HMS.get("services");
      const services = data.filter(s =>
        Object.values(s).join(" ").toLowerCase().includes(keyword)
      );

      document.getElementById("serviceTable").innerHTML = services.map(s => `
        <tr>
          <td><strong>${s.serviceId}</strong></td>
          <td>${s.guestName}</td>
          <td>${s.serviceName}</td>
          <td>${HMS.formatCurrency(s.servicePrice)}</td>
          <td>${HMS.formatDate(s.serviceDate)}</td>
          <td>
            <button class="btn btn-secondary small-btn" onclick="editService('${s.serviceId}')">✏️ Edit</button>
            <button class="btn btn-danger small-btn" onclick="deleteService('${s.serviceId}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="6" class="empty-state"><span class="icon">🛎️</span><h3>No services found</h3><p>Add your first service using the form above</p></td></tr>`;
    }

    async function editService(id) {
      const s = await HMS.find("services", id, "serviceId");
      if (!s) return;

      document.getElementById("editServiceId").value = s.serviceId;
      document.getElementById("bookingId").value = s.bookingId;
      document.getElementById("serviceName").value = s.serviceName;
      document.getElementById("servicePrice").value = s.servicePrice;
      document.getElementById("serviceDate").value = s.serviceDate;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteService(id) {
      if (confirmDelete("Are you sure you want to delete this service?")) {
        await HMS.remove("services", id, "serviceId");
        renderServices();
      }
    }

    document.getElementById("serviceForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const editId = document.getElementById("editServiceId").value;
      const booking = await HMS.find("bookings", document.getElementById("bookingId").value, "bookingId");

      const record = {
        serviceId: editId || HMS.generateId("S"),
        bookingId: booking.bookingId,
        guestName: booking.guestName,
        serviceName: document.getElementById("serviceName").value,
        servicePrice: Number(document.getElementById("servicePrice").value),
        serviceDate: document.getElementById("serviceDate").value
      };

      await HMS.save("services", record, editId, "serviceId");
      resetServiceForm();
      renderServices();
    });

    document.getElementById("searchService").addEventListener("input", renderServices);
    document.addEventListener("DOMContentLoaded", async function() {
      await loadServiceSelects();
      await renderServices();
    });
  </script>
</body>
</html>
