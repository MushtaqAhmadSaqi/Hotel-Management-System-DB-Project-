<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff - Royal Stay HMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="menu-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h2>Royal Stay</h2>
        <p>Hotel Management System</p>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="guests.html"><span class="icon">👥</span> Guests</a>
        <a href="rooms.html"><span class="icon">🛏️</span> Rooms</a>
        <a href="bookings.html"><span class="icon">📅</span> Bookings</a>
        <a href="payments.html"><span class="icon">💳</span> Payments</a>
        <a href="services.html"><span class="icon">🛎️</span> Services</a>
        <a href="staff.html" class="active"><span class="icon">👨‍💼</span> Staff</a>
        <a href="reports.html"><span class="icon">📈</span> Reports</a>
        <a href="#" onclick="HMS.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Staff Management</h1>
          <p>Manage hotel employees and their details.</p>
        </div>
        <div class="topbar-right">
          <div class="user-avatar">A</div>
          <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
        </div>
      </header>

      <section class="content-card">
        <h2>Add New Staff</h2>
        <form id="staffForm">
          <input type="hidden" id="editStaffId" />
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Employee name" required />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" placeholder="e.g. 03001234567" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="employee@example.com" />
            </div>
            <div class="form-group">
              <label>Role / Position</label>
              <select id="role">
                <option>Manager</option>
                <option>Receptionist</option>
                <option>Cleaner</option>
                <option>Waiter</option>
                <option>Security Guard</option>
                <option>Accountant</option>
                <option>Chef</option>
                <option>Concierge</option>
              </select>
            </div>
            <div class="form-group">
              <label>Salary (PKR)</label>
              <input type="number" id="salary" placeholder="Monthly salary" required />
            </div>
            <div class="form-group">
              <label>Joining Date</label>
              <input type="date" id="joiningDate" required />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option>Active</option>
                <option>Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Staff</button>
            <button class="btn btn-light" type="button" onclick="resetStaffForm()">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="content-card">
        <div class="table-header">
          <h2>All Staff</h2>
          <input class="search-input" id="searchStaff" placeholder="🔍 Search staff..." />
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Role</th>
                <th>Salary</th>
                <th>Joined</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="staffTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.menu-overlay').classList.toggle('active');
    }

    function resetStaffForm() {
      document.getElementById("staffForm").reset();
      document.getElementById("editStaffId").value = "";
    }

    function renderStaff() {
      const keyword = document.getElementById("searchStaff").value.toLowerCase();
      const staff = HMS.get("staff").filter(s =>
        Object.values(s).join(" ").toLowerCase().includes(keyword)
      );

      document.getElementById("staffTable").innerHTML = staff.map(s => `
        <tr>
          <td><strong>${s.staffId}</strong></td>
          <td>${s.fullName}</td>
          <td>${s.phone}</td>
          <td>${s.email || "-"}</td>
          <td>${s.role}</td>
          <td>${HMS.formatCurrency(s.salary)}/mo</td>
          <td>${HMS.formatDate(s.joiningDate)}</td>
          <td>${HMS.badge(s.status)}</td>
          <td>
            <button class="btn btn-secondary small-btn" onclick="editStaff('${s.staffId}')">✏️ Edit</button>
            <button class="btn btn-danger small-btn" onclick="deleteStaff('${s.staffId}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="9" class="empty-state"><span class="icon">👨‍💼</span><h3>No staff found</h3><p>Add your first staff member using the form above</p></td></tr>`;
    }

    function editStaff(id) {
      const s = HMS.find("staff", id, "staffId");
      if (!s) return;

      document.getElementById("editStaffId").value = s.staffId;
      document.getElementById("fullName").value = s.fullName;
      document.getElementById("phone").value = s.phone;
      document.getElementById("email").value = s.email || "";
      document.getElementById("role").value = s.role;
      document.getElementById("salary").value = s.salary;
      document.getElementById("joiningDate").value = s.joiningDate;
      document.getElementById("status").value = s.status;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteStaff(id) {
      if (confirmDelete("Are you sure you want to delete this staff record?")) {
        HMS.remove("staff", id, "staffId");
        renderStaff();
      }
    }

    document.getElementById("staffForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const editId = document.getElementById("editStaffId").value;
      const record = {
        staffId: editId || HMS.generateId("ST"),
        fullName: document.getElementById("fullName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
        role: document.getElementById("role").value,
        salary: Number(document.getElementById("salary").value),
        joiningDate: document.getElementById("joiningDate").value,
        status: document.getElementById("status").value
      };

      HMS.save("staff", record, editId, "staffId");
      resetStaffForm();
      renderStaff();
    });

    document.getElementById("searchStaff").addEventListener("input", renderStaff);
    document.addEventListener("DOMContentLoaded", renderStaff);
  </script>
</body>
</html>
