<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Management - Hotel Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    
<aside class="sidebar">
  <div class="brand">
    <h2>Royal Stay HMS</h2>
    <p>Hotel Management System</p>
  </div>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="guests.html">Guests</a>
    <a href="rooms.html">Rooms</a>
    <a href="bookings.html">Bookings</a>
    <a href="payments.html">Payments</a>
    <a href="services.html">Services</a>
    <a href="staff.html">Staff</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="HMS.logout()">Logout</a>
  </nav>
</aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Staff Management</h1>
          <p>Manage hotel employees, roles, salaries, and employment status.</p>
        </div>
        <button class="btn btn-light" onclick="HMS.logout()">Logout</button>
      </header>

      
<section class="content-card">
  <h2>Staff Form</h2>
  <form id="staffForm">
    <input type="hidden" id="editStaffId" />
    <div class="form-grid">
      <div class="form-group">
        <label>Staff ID</label>
        <input type="text" id="staffId" placeholder="Auto or type e.g. ST001" />
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" required />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option>Manager</option>
          <option>Receptionist</option>
          <option>Cleaner</option>
          <option>Waiter</option>
          <option>Security Guard</option>
          <option>Accountant</option>
        </select>
      </div>
      <div class="form-group">
        <label>Salary</label>
        <input type="number" id="salary" required />
      </div>
      <div class="form-group">
        <label>Joining Date</label>
        <input type="date" id="joiningDate" required />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save Staff</button>
      <button class="btn btn-light" type="button" onclick="resetStaffForm()">Clear</button>
    </div>
  </form>
</section>

<section class="content-card">
  <div class="table-header">
    <h2>Staff Records</h2>
    <input class="search-input" id="searchStaff" placeholder="Search staff..." />
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Staff ID</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Role</th>
          <th>Salary</th>
          <th>Joining Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="staffTable"></tbody>
    </table>
  </div>
</section>

    </main>
  </div>

  <script src="js/app.js"></script>
  
<script>
function resetStaffForm() {
  document.getElementById("staffForm").reset();
  document.getElementById("editStaffId").value = "";
}

function renderStaff() {
  const keyword = document.getElementById("searchStaff").value.toLowerCase();
  const staff = HMS.get("staff").filter(s =>
    Object.values(s).join(" ").toLowerCase().includes(keyword)
  );

  document.getElementById("staffTable").innerHTML = staff.map(s => `
    <tr>
      <td>${s.staffId}</td>
      <td>${s.fullName}</td>
      <td>${s.phone}</td>
      <td>${s.email || "-"}</td>
      <td>${s.role}</td>
      <td>${s.salary}</td>
      <td>${s.joiningDate}</td>
      <td>${HMS.badge(s.status)}</td>
      <td>
        <button class="btn btn-secondary small-btn" onclick="editStaff('${s.staffId}')">Edit</button>
        <button class="btn btn-danger small-btn" onclick="deleteStaff('${s.staffId}')">Delete</button>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="9">No staff records found.</td></tr>`;
}

function editStaff(id) {
  const s = HMS.find("staff", id, "staffId");
  if (!s) return;

  document.getElementById("editStaffId").value = s.staffId;
  document.getElementById("staffId").value = s.staffId;
  document.getElementById("fullName").value = s.fullName;
  document.getElementById("phone").value = s.phone;
  document.getElementById("email").value = s.email || "";
  document.getElementById("role").value = s.role;
  document.getElementById("salary").value = s.salary;
  document.getElementById("joiningDate").value = s.joiningDate;
  document.getElementById("status").value = s.status;
}

function deleteStaff(id) {
  if (confirm("Are you sure you want to delete this staff record?")) {
    HMS.remove("staff", id, "staffId");
    renderStaff();
  }
}

document.getElementById("staffForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const editId = document.getElementById("editStaffId").value;
  const record = {
    staffId: document.getElementById("staffId").value.trim() || HMS.generateId("ST"),
    fullName: document.getElementById("fullName").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    role: document.getElementById("role").value,
    salary: Number(document.getElementById("salary").value),
    joiningDate: document.getElementById("joiningDate").value,
    status: document.getElementById("status").value
  };

  HMS.save("staff", record, editId, "staffId");
  resetStaffForm();
  renderStaff();
});

document.getElementById("searchStaff").addEventListener("input", renderStaff);
document.addEventListener("DOMContentLoaded", renderStaff);
</script>

</body>
</html>
